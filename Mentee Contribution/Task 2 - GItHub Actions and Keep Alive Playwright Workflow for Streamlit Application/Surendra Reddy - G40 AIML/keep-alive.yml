name: Keep Streamlit App Warm

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  wake-app:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Open Streamlit app in browser
        env:
          APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "STREAMLIT_APP_URL secret is missing."
            exit 1
          fi
          node <<'EOF'
          const { chromium } = require("playwright");
          (async () => {
            const url = process.env.APP_URL;
            console.log(`Opening ${url}`);
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            await page.goto(url, {
              waitUntil: "networkidle",
              timeout: 60000
            });

            await page.waitForTimeout(5000);

            const wakeButton = page.getByText("Yes, get this app back up!");
            const buttonVisible = await wakeButton.isVisible().catch(() => false);

           if (buttonVisible) {
              console.log("App was asleep, clicking wake-up button...");
              await wakeButton.click();
              await page.waitForLoadState("networkidle", { timeout: 60000 }).catch(() => {});
              await page.waitForTimeout(15000);
            } else {
              console.log("App was already awake.");
            }

            const title = await page.title();
            console.log(`Page title: ${title}`);
            await browser.close();
            console.log("Streamlit app check complete.");
          })();
          EOF
