name: Keep Streamlit App Warm (Playwright)

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  wake-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Open Streamlit App
        run: |
          node <<'EOF'
          const { chromium } = require("playwright");

          (async () => {
            const url = "https://quality-of-life-intelligence-platform1-gxh4fhtf9tscaynswpud5n.streamlit.app/";

            console.log(`Opening: ${url}`);

            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            await page.goto(url, {
              waitUntil: "networkidle",
              timeout: 60000
            });

            await page.waitForTimeout(10000);

            const title = await page.title();
            console.log("Page title:", title);

            await browser.close();
            console.log("Streamlit app kept alive successfully.");
          })();
          EOF